<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Fast Play Mode Safety Guard readiness preview</title>
  <desc id="desc">preview artwork for readiness states.</desc>
  <rect width="1280" height="720" fill="#101724"/>
  <text x="132" y="132" fill="#ecf1f8" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800">Readiness status, not guesswork</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="132" y="190" width="220" height="330" rx="22" fill="#2a1212" stroke="#ef4444"/>
    <text x="166" y="250" fill="#fecaca" font-size="28" font-weight="800">Unsafe</text>
    <text x="166" y="304" fill="#fca5a5" font-size="20">Critical active risks</text>
    <rect x="390" y="190" width="220" height="330" rx="22" fill="#2a1b0d" stroke="#fb8114"/>
    <text x="424" y="250" fill="#ffbd7a" font-size="28" font-weight="800">Needs Review</text>
    <text x="424" y="304" fill="#fed7aa" font-size="20">High risks remain</text>
    <rect x="648" y="190" width="220" height="330" rx="22" fill="#1f2937" stroke="#eab308"/>
    <text x="682" y="250" fill="#fde68a" font-size="28" font-weight="800">Probably Safe</text>
    <text x="682" y="304" fill="#fef3c7" font-size="20">Warnings remain</text>
    <rect x="906" y="190" width="242" height="330" rx="22" fill="#0f2a1b" stroke="#22c55e"/>
    <text x="940" y="250" fill="#bbf7d0" font-size="28" font-weight="800">Safe Enough</text>
    <text x="940" y="304" fill="#dcfce7" font-size="20">No active risks</text>
  </g>
  <path d="M220 594h840" stroke="#334155" stroke-width="12" stroke-linecap="round"/>
  <path d="M220 594h534" stroke="#fb8114" stroke-width="12" stroke-linecap="round"/>
  <text x="132" y="688" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="22">Preview visual</text>
</svg>
