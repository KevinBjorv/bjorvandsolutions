    - main [ref=f3e71]:
      - generic [ref=f3e72]:
        - heading "UI Breakpoint Lab Documentation" [level=1] [ref=f3e73]
        - paragraph [ref=f3e74]: UI Breakpoint Lab is a Unity Editor utility for repeatable UGUI layout checks and visual regression captures.
        - paragraph [ref=f3e75]: It renders a selected scene Canvas or UI prefab against a saved matrix of viewport, orientation, safe-area, and text-expansion profiles, then presents screenshots and measured findings in one contact sheet.
        - paragraph [ref=f3e76]: Every isolated capture is labeled as an approximation. It is layout-analysis evidence, not a substitute for a player build on physical hardware.
        - paragraph [ref=f3e77]:
          - link "Open UI Breakpoint Lab on the Unity Asset Store" [ref=f3e78] [cursor=pointer]:
            - /url: https://assetstore.unity.com/packages/slug/392246
          - text: .
      - generic [ref=f3e80]:
        - heading "1. Requirements and Compatibility" [level=2] [ref=f3e81]
        - list [ref=f3e82]:
          - listitem [ref=f3e83]:
            - text: "Minimum Unity version:"
            - code [ref=f3e84]: 2022.3.41f1
            - text: .
          - listitem [ref=f3e85]:
            - text: "Release-tested editors:"
            - code [ref=f3e86]: 2022.3.41f1
            - text: ","
            - code [ref=f3e87]: 6000.3.9f1
            - text: ", and"
            - code [ref=f3e88]: 6000.4.4f1
            - text: .
          - listitem [ref=f3e89]: UGUI is required.
          - listitem [ref=f3e90]: Built-in Render Pipeline and Universal Render Pipeline are the release-tested paths.
          - listitem [ref=f3e91]: TextMesh Pro is optional. TMP overflow checks and expansion passes are enabled when its public assembly is available.
        - paragraph [ref=f3e92]:
          - text: Other Scriptable Render Pipelines are conditional on accepting Unity's public standard camera render request. Unity versions older than
          - code [ref=f3e93]: 2022.3.41f1
          - text: are unsupported.
      - generic [ref=f3e94]:
        - heading "2. Installation" [level=2] [ref=f3e95]
        - list [ref=f3e96]:
          - listitem [ref=f3e97]: Import the complete UI Breakpoint Lab package into the Unity project.
          - listitem [ref=f3e98]:
            - text: Keep the supplied folders and
            - code [ref=f3e99]: .meta
            - text: files together.
          - listitem [ref=f3e100]: Wait for compilation to finish and resolve the first Console error if Unity reports one.
          - listitem [ref=f3e101]:
            - text: Open the tool from
            - strong [ref=f3e102]: Tools > UI Breakpoint Lab
            - text: .
        - paragraph [ref=f3e103]: If the menu item is missing, confirm the minimum Editor version, UGUI installation, complete import, and project compilation state.
      - generic [ref=f3e104]:
        - heading "3. Five-Minute Quick Start" [level=2] [ref=f3e105]
        - list [ref=f3e106]:
          - listitem [ref=f3e107]: Open a scene containing a UGUI Canvas, or select a UI prefab.
          - listitem [ref=f3e108]:
            - text: Open
            - strong [ref=f3e109]: Tools > UI Breakpoint Lab
            - text: .
          - listitem [ref=f3e110]: Choose the active scene, a Canvas, or the prefab as the target.
          - listitem [ref=f3e111]:
            - text: Select
            - strong [ref=f3e112]: Mobile Essentials
            - text: .
          - listitem [ref=f3e113]:
            - text: Keep the text passes you want to inspect and select
            - strong [ref=f3e114]: Run Matrix
            - text: .
          - listitem [ref=f3e115]: Filter the contact sheet to warnings or failures and open a finding.
          - listitem [ref=f3e116]: Save the configuration as a suite. After review, capture the completed run as a baseline.
        - paragraph [ref=f3e117]: Baseline capture accepts the current images as regression references. It does not mean every warning is resolved; rule severity and reasoned suppressions remain the suite's policy.
      - generic [ref=f3e118]:
        - heading "4. Targets and Profiles" [level=2] [ref=f3e119]
        - heading "Supported targets" [level=3] [ref=f3e120]
        - list [ref=f3e121]:
          - listitem [ref=f3e122]: Root Canvases in the active or selected scene.
          - listitem [ref=f3e123]: One Canvas in an open scene.
          - listitem [ref=f3e124]: One isolated UI prefab.
        - paragraph [ref=f3e125]:
          - text: An unloaded scene can be opened additively long enough to clone its root Canvases, then closed without saving. Unity can still invoke project
          - code [ref=f3e126]: ExecuteAlways
          - text: code during scene loading.
        - heading "Profiles" [level=3] [ref=f3e127]
        - paragraph [ref=f3e128]: Built-in profiles cover generic phone, tablet, desktop, ultrawide, and console-safe-area layouts. Custom profiles store pixel dimensions, DPI metadata, pixels per point, orientation, and a bottom-left-origin safe rectangle.
        - paragraph [ref=f3e129]: The source target is cloned into a preview scene. Source scenes and prefabs are not edited by analysis or text transformation.
      - generic [ref=f3e130]:
        - heading "5. Rules and Suppressions" [level=2] [ref=f3e131]
        - paragraph [ref=f3e132]: "Version 1 includes six versioned layout rules with measured evidence:"
        - list [ref=f3e133]:
          - listitem [ref=f3e134]:
            - code [ref=f3e135]: UBL001
            - text: Viewport Overflow.
          - listitem [ref=f3e136]:
            - code [ref=f3e137]: UBL002
            - text: Parent Clipping.
          - listitem [ref=f3e138]:
            - code [ref=f3e139]: UBL003
            - text: Safe-Area Violation.
          - listitem [ref=f3e140]:
            - code [ref=f3e141]: UBL004
            - text: Text Overflow.
          - listitem [ref=f3e142]:
            - code [ref=f3e143]: UBL005
            - text: Overlap heuristic.
          - listitem [ref=f3e144]:
            - code [ref=f3e145]: UBL006
            - text: Touch-target checks.
        - paragraph [ref=f3e146]: Suites can override severity per rule. Suppressions require a reason and can target an object, hierarchy, profile and suite combination, or the whole suite. Use the narrowest scope that expresses the intended design.
        - paragraph [ref=f3e147]: Suppressed findings retain their evidence and suppression state in reports.
      - generic [ref=f3e148]:
        - heading "6. Text Expansion and Pseudolocalization" [level=2] [ref=f3e149]
        - paragraph [ref=f3e150]: Available passes are Original, 120%, 150%, 200%, and deterministic ASCII pseudolocalization.
        - list [ref=f3e151]:
          - listitem [ref=f3e152]: Transformations run only on preview clones.
          - listitem [ref=f3e153]: Rich-text tags and composite-format placeholders are preserved.
          - listitem [ref=f3e154]:
            - text: Static
            - code [ref=f3e155]: UnityEngine.UI.Text
            - text: is supported directly.
          - listitem [ref=f3e156]: Public TMP text components are supported when TMP is available.
          - listitem [ref=f3e157]: Custom text sources can use the shipped preview-text adapter.
        - paragraph [ref=f3e158]: Unity Localization package integration and platform-font equivalence are not included in version 1.
      - generic [ref=f3e159]:
        - heading "7. Baselines and Visual Diffs" [level=2] [ref=f3e160]
        - paragraph [ref=f3e161]: A baseline is an explicitly accepted set of PNG captures and versioned metadata. Baseline identity prevents unrelated profile, text, tool, or rendering environments from being treated as interchangeable.
        - list [ref=f3e162]:
          - listitem [ref=f3e163]: Compare side by side, with a wipe, or through a heatmap.
          - listitem [ref=f3e164]: Configure integer RGBA tolerance from 0 through 255.
          - listitem [ref=f3e165]: Use small ignored regions only for understood, intentionally variable content.
          - listitem [ref=f3e166]: Update one accepted profile and text-pass entry, or separately confirm a complete baseline replacement.
        - paragraph [ref=f3e167]: Pixel-dimension and color-space mismatches block numeric comparison. Unity-version, render-pipeline, and graphics-API differences produce prominent compatibility warnings.
      - generic [ref=f3e168]:
        - heading "8. Reports and Annotations" [level=2] [ref=f3e169]
        - paragraph [ref=f3e170]: In-Editor reports are versioned ScriptableObject assets containing captures, findings, environment metadata, annotations, progress outcome, and approximation warnings.
        - paragraph [ref=f3e171]: Reports can be exported as JSON schema version 1 or portable HTML. Keep the HTML file beside its complete sibling-assets folder so screenshot references remain valid.
        - paragraph [ref=f3e172]: Each finding records its rule and version, evidence type, effective severity, measured values, top-left-origin screenshot coordinates, stable source identity, and suppression state.
      - generic [ref=f3e173]:
        - heading "9. Command Line and CI" [level=2] [ref=f3e174]
        - paragraph [ref=f3e175]: The command-line runner executes the same suite, profiles, rules, severity policy, suppressions, baselines, diff algorithm, and exporters as the Editor window.
        - generic [ref=f3e176]:
          - code [ref=f3e178]: Unity.exe -batchmode -projectPath "C:\work\MyGame" ^ -executeMethod KevinBjorvand.UIBreakpointLab.UIBreakpointCli.Run ^ -ublSuite "Assets/UI Tests/Main Menu.asset" ^ -ublOutput "C:\work\artifacts\ui-breakpoint-lab" ^ -logFile "C:\work\artifacts\ui-breakpoint-lab.log"
          - button "Copy code" [ref=f3e179]:
            - generic [ref=f3e183]: Copy
        - paragraph [ref=f3e184]:
          - text: Screenshot capture requires graphics. Do not use
          - code [ref=f3e185]: "-nographics"
          - text: . The suite target must be a saved scene, persistent Canvas reference, or prefab; dynamic Active Scene targets are rejected in batch mode.
        - heading "Exit codes" [level=3] [ref=f3e186]
        - list [ref=f3e187]:
          - listitem [ref=f3e188]:
            - code [ref=f3e189]: "0"
            - text: ": complete matrix, verified source integrity, configured gate passed."
          - listitem [ref=f3e190]:
            - code [ref=f3e191]: "2"
            - text: ": configured finding, required comparison, or diff-budget failure."
          - listitem [ref=f3e192]:
            - code [ref=f3e193]: "3"
            - text: ": invalid arguments, suite path, suite validation, or target."
          - listitem [ref=f3e194]:
            - code [ref=f3e195]: "4"
            - text: ": the run or export could not produce trustworthy complete evidence."
        - paragraph [ref=f3e196]:
          - text: Add
          - code [ref=f3e197]: "-ublFailOnWarnings"
          - text: when configured warnings should also fail the gate. Archive the complete output directory and Editor log.
      - generic [ref=f3e198]:
        - heading "10. Accuracy and Version 1 Limits" [level=2] [ref=f3e199]
        - paragraph [ref=f3e200]: UI Breakpoint Lab uses documented public Unity APIs and does not reflect into Game view or Device Simulator internals.
        - paragraph [ref=f3e201]:
          - text: Public Editor APIs cannot replace
          - code [ref=f3e202]: Screen.width
          - text: ","
          - code [ref=f3e203]: Screen.height
          - text: ","
          - code [ref=f3e204]: Screen.safeArea
          - text: ","
          - code [ref=f3e205]: Screen.dpi
          - text: ", runtime orientation, or device services. Preview-aware project code can use the shipped preview context and safe-area adapter."
        - paragraph [ref=f3e206]: Version 1 does not include UI Toolkit validation, XR or custom render-texture UI, physical-device rendering, performance simulation, exact platform-font rendering, automatic gameplay navigation, automatic layout rewriting, or Unity Localization package integration.
      - generic [ref=f3e207]:
        - heading "11. Troubleshooting and Support" [level=2] [ref=f3e208]
        - heading "Blank or missing CI screenshots" [level=3] [ref=f3e209]
        - paragraph [ref=f3e210]:
          - text: Remove
          - code [ref=f3e211]: "-nographics"
          - text: ", confirm the agent has a usable graphics environment, and confirm the active pipeline accepts the public render request."
        - heading "Repeated captures differ" [level=3] [ref=f3e212]
        - paragraph [ref=f3e213]: Check the Unity version, pipeline, color space, graphics API, fonts, animation, generated assets, and time-, random-, network-, or device-dependent preview content.
        - heading "Project code ignores the simulated safe area" [level=3] [ref=f3e214]
        - paragraph [ref=f3e215]:
          - text: Code that reads
          - code [ref=f3e216]: Screen.safeArea
          - text: directly receives the Editor value. Use the preview context or safe-area adapter for opt-in preview behavior.
        - heading "Source scene or prefab becomes dirty" [level=3] [ref=f3e217]
        - paragraph [ref=f3e218]: Do not save the unexpected changes. Cancel the run, preserve the target, phase, Editor log, and version-control diff, and report it as a defect.
        - paragraph [ref=f3e219]:
          - link "Contact support" [ref=f3e220] [cursor=pointer]:
            - /url: /support/
          - text: ", review the"
          - link "license" [ref=f3e221] [cursor=pointer]:
            - /url: /assets/ui-breakpoint-lab/license/
          - text: ", or browse the"
          - link "UI Breakpoint Lab articles" [ref=f3e222] [cursor=pointer]:
