      - generic [ref=f4e42]:
        - article [ref=f4e43]:
          - generic [ref=f4e44]:
            - heading "Why is one Game view size not enough for Unity UI testing?" [level=2] [ref=f4e45]
            - paragraph [ref=f4e46]: A UGUI screen can look correct at one resolution and still overflow, clip, overlap, or enter a safe area at another shape. Orientation and asymmetric safe areas add layout pressure that a single desktop preview does not represent.
            - paragraph [ref=f4e47]: "The useful change is consistency: keep the target and rule policy fixed while the viewport profile changes. That makes each result comparable instead of turning the review into a series of unrelated manual resizes."
            - list [ref=f4e48]:
              - listitem [ref=f4e49]: Phone, tablet, desktop, ultrawide, and console-safe-area profiles cover different layout shapes.
              - listitem [ref=f4e50]: Custom profiles can store pixel dimensions, DPI metadata, pixels per point, orientation, and a safe rectangle.
              - listitem [ref=f4e51]: Each isolated capture is labeled as an approximation rather than a physical-device emulation.
          - generic [ref=f4e52]:
            - heading "How do you run the first breakpoint matrix?" [level=2] [ref=f4e53]
            - paragraph [ref=f4e54]: Open a scene with a UGUI Canvas or select a UI prefab, then open Tools > UI Breakpoint Lab. The Mobile Essentials preset is the shortest documented route to a useful first contact sheet.
            - paragraph [ref=f4e55]: The tool clones the target into an isolated preview scene. It does not save or edit the source scene or prefab during analysis.
            - list [ref=f4e56]:
              - listitem [ref=f4e57]: Choose the active scene, a specific Canvas, or a UI prefab as the target.
              - listitem [ref=f4e58]: Select Mobile Essentials and keep the text passes you want to inspect.
              - listitem [ref=f4e59]: Run the matrix and filter the contact sheet to warnings or failures.
              - listitem [ref=f4e60]: Open a finding to review its rule ID, severity, profile, and exact measured evidence.
          - region "Primary call to action" [ref=f4e61]:
            - heading "Turn one-off Game view checks into a repeatable layout matrix." [level=2] [ref=f4e62]
            - paragraph [ref=f4e63]: UI Breakpoint Lab captures a selected scene Canvas or UI prefab across saved profiles and keeps screenshots and measured findings together in one contact sheet.
            - generic [ref=f4e64]:
              - link "Read UI Breakpoint Lab docs" [ref=f4e65] [cursor=pointer]:
                - /url: /assets/ui-breakpoint-lab/docs/
              - link "Asset Store" [ref=f4e66] [cursor=pointer]:
                - /url: https://assetstore.unity.com/packages/slug/392246
          - generic [ref=f4e68]:
            - heading "Which UGUI layout findings are measured?" [level=2] [ref=f4e69]
            - paragraph [ref=f4e70]: Version 1 includes six versioned rules. Deterministic geometry problems can be failures, while heuristic findings such as overlap are warnings by default. Suites can override severity per rule.
            - paragraph [ref=f4e71]: Each finding retains its source identity, screenshot coordinates, effective severity, and measured evidence so a reviewer can move from the contact sheet back to the responsible object when it still exists.
            - list [ref=f4e72]:
              - listitem [ref=f4e73]: Viewport overflow and supported parent clipping.
              - listitem [ref=f4e74]: Safe-area violations and text overflow.
              - listitem [ref=f4e75]: Overlap heuristics and configurable touch-target checks.
              - listitem [ref=f4e76]: Reasoned suppressions at object, hierarchy, profile, or suite scope.
          - generic [ref=f4e77]:
            - heading "Where does an Editor layout preview have limits?" [level=2] [ref=f4e78]
            - paragraph [ref=f4e79]: Unity's public Editor APIs cannot replace Screen.width, Screen.height, Screen.safeArea, Screen.dpi, runtime orientation, or device services. Project code that reads those values directly continues to receive the Editor values.
            - paragraph [ref=f4e80]: UI Breakpoint Lab provides a preview context and safe-area adapter for custom layout code that needs simulated inputs, but the capture still does not claim exact device rendering, platform fonts, performance, or physical-device behavior.
            - list [ref=f4e81]:
              - listitem [ref=f4e82]: UGUI is required; UI Toolkit is outside version 1 scope.
              - listitem [ref=f4e83]: Built-in and URP are the release-tested rendering paths.
              - listitem [ref=f4e84]: Physical-device testing remains necessary for final platform validation.
          - generic [ref=f4e85]:
            - heading "Start with Mobile Essentials, then save the matrix your project actually needs." [level=2] [ref=f4e86]
            - paragraph [ref=f4e87]: The documentation covers targets, profiles, rules, suppressions, and the approximation limits of isolated Editor captures.
