              - text: If you've ever shipped a build and realized half your textures were uncompressed or your audio was set to Decompress on Load across the board, this tool is for you. You define your import rules once using Unity's built-in Presets, point them at folder paths, and from that point on, every asset that comes in gets checked and corrected automatically. It's editor-only, lightweight, and does exactly what it promises.
