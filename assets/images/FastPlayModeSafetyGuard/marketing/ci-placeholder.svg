<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Fast Play Mode Safety Guard CI preview</title>
  <desc id="desc">preview artwork for CI JSON reports and exit codes.</desc>
  <rect width="1280" height="720" fill="#0b1017"/>
  <rect x="116" y="88" width="1048" height="544" rx="28" fill="#131c2a" stroke="#334155"/>
  <text x="164" y="154" fill="#ecf1f8" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">CI reports for Fast Play Mode rollout</text>
  <rect x="164" y="226" width="624" height="330" rx="18" fill="#0f1724" stroke="#2f3d52"/>
  <text x="200" y="286" fill="#93c5fd" font-family="Consolas, monospace" font-size="24">Unity.exe -batchmode -quit</text>
  <text x="200" y="330" fill="#93c5fd" font-family="Consolas, monospace" font-size="24">-executeMethod FastPlayModeSafetyGuard.CI.RunScan</text>
  <text x="200" y="396" fill="#e5e7eb" font-family="Consolas, monospace" font-size="24">{</text>
  <text x="236" y="440" fill="#ffbd7a" font-family="Consolas, monospace" font-size="24">"readiness": "NeedsReview",</text>
  <text x="236" y="484" fill="#ffbd7a" font-family="Consolas, monospace" font-size="24">"criticalCount": 0,</text>
  <text x="236" y="528" fill="#ffbd7a" font-family="Consolas, monospace" font-size="24">"highRiskCount": 3</text>
  <text x="200" y="572" fill="#e5e7eb" font-family="Consolas, monospace" font-size="24">}</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="834" y="226" width="282" height="86" rx="18" fill="#10251b" stroke="#22c55e"/>
    <text x="876" y="280" fill="#bbf7d0" font-size="28" font-weight="800">Exit 0</text>
    <rect x="834" y="348" width="282" height="86" rx="18" fill="#2a1b0d" stroke="#fb8114"/>
    <text x="876" y="402" fill="#ffbd7a" font-size="28" font-weight="800">Exit 1</text>
    <rect x="834" y="470" width="282" height="86" rx="18" fill="#27151f" stroke="#e11d48"/>
    <text x="876" y="524" fill="#fecdd3" font-size="28" font-weight="800">Exit 2</text>
  </g>
  <text x="116" y="688" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="22">Preview visual</text>
</svg>
