          - heading "How to Test Unity UI Across Breakpoints and Safe Areas" [level=1] [ref=f4e26]
          - paragraph [ref=f4e27]: Run a repeatable UGUI matrix across viewport, orientation, and safe-area profiles, then inspect measured layout findings.
          - generic [ref=f4e28]:
            - generic [ref=f4e29]: July 11, 2026
            - generic [ref=f4e30]: •
            - generic [ref=f4e31]: 8 min read
            - generic [ref=f4e32]: •
            - generic [ref=f4e33]: Kevin Ahlgren Bjorvand
          - paragraph [ref=f4e35]: To test Unity UGUI layouts across breakpoints, run the same saved target through a defined matrix of viewport, orientation, safe-area, and text profiles, then review measured findings instead of relying on one Game view size.
          - generic [ref=f4e36]:
            - generic [ref=f4e37]: Updated July 11, 2026
            - generic [ref=f4e38]: Docs, Asset Store, and license links stay in the sidebar
        - figure "Measured overlays expose overflow, clipping, overlap, and safe-area problems at each layout profile." [ref=f4e39]:
